<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#1f2a44" />
  <meta name="description" content="Virtuelle Fitnessrezepte App mit 24 Rezepten, Favoriten, Story-Export und Rezeptliste." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/favicon.png" type="image/png" />
  <title>Fitnessrezepte App</title>
  <style>
    :root{
      --bg:#f3f5fa;
      --bg-2:#eef2fb;
      --panel:rgba(255,255,255,.82);
      --panel-strong:rgba(255,255,255,.92);
      --panel-solid:#ffffff;
      --text:#182033;
      --muted:#62708d;
      --line:#dfe6f3;
      --line-strong:#ccd6e8;
      --brand:#ef9b20;
      --brand-soft:#fff1d8;
      --navy:#1f2a44;
      --shadow:0 20px 55px rgba(20,30,55,.10);
      --shadow-soft:0 10px 24px rgba(20,30,55,.07);
      --radius-xl:34px;
      --radius-lg:24px;
      --radius-md:18px;
      --radius-sm:14px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}
    body{
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(239,155,32,.11), transparent 22%),
        radial-gradient(circle at 100% 0%, rgba(80,120,255,.10), transparent 18%),
        linear-gradient(180deg, #f7f9fe 0%, #eef3fb 42%, #f3f5fa 100%);
      padding:18px 14px 34px;
    }
    body::before,body::after{
      content:"";
      position:fixed;
      inset:auto;
      z-index:-1;
      width:320px;height:320px;border-radius:999px;filter:blur(70px);opacity:.25;pointer-events:none;
    }
    body::before{top:-80px;right:-40px;background:rgba(239,155,32,.32)}
    body::after{left:-90px;bottom:80px;background:rgba(92,128,255,.22)}
    img{max-width:100%}
    button,input{font:inherit}
    button{border:none;cursor:pointer}
    .app-shell{max-width:1040px;margin:0 auto}
    .header-card{
      background:var(--panel);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.75);
      border-radius:28px;
      padding:16px 18px;
      box-shadow:var(--shadow);
      margin-bottom:16px;
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .brand{display:flex;align-items:center;gap:16px;min-width:0;flex:1}
    .brand-logo{display:block;height:62px;width:auto;max-width:min(46vw,340px);object-fit:contain;filter:drop-shadow(0 10px 22px rgba(20,30,55,.08))}
    .brand-copy{min-width:0}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;background:var(--brand-soft);color:#8f5a00;font-size:.74rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;margin-bottom:8px}
    .eyebrow-dot{width:7px;height:7px;border-radius:999px;background:var(--brand)}
    .brand h1{margin:0;font-size:clamp(1.08rem,2.5vw,1.42rem);line-height:1.04}
    .brand-meta{margin-top:6px;color:var(--muted);font-size:.92rem;font-weight:600}
    .action-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .chip-btn,.icon-btn,.nav-btn,.primary-btn,.ghost-btn,.sheet-btn,.filter-chip{
      border:1px solid var(--line);
      background:var(--panel-solid);
      color:var(--text);
      box-shadow:var(--shadow-soft);
      transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }
    .chip-btn:hover,.icon-btn:hover,.nav-btn:hover,.primary-btn:hover,.ghost-btn:hover,.sheet-btn:hover,.filter-chip:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(20,30,55,.10)}
    .chip-btn{padding:13px 18px;border-radius:16px;font-weight:800}
    .icon-btn{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;font-size:1.08rem;font-weight:900}
    .icon-btn.active{background:linear-gradient(135deg,var(--brand),#ffc65e);border-color:#f1b042;color:#fff}
    .stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
    .stat-card{
      background:var(--panel);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.78);
      border-radius:22px;
      padding:14px 16px;
      box-shadow:var(--shadow);
    }
    .stat-card .label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .stat-card .value{margin-top:6px;font-size:1.05rem;font-weight:900}
    .recipe-stage{
      position:relative;
      background:var(--panel);
      backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.82);
      border-radius:34px;
      box-shadow:var(--shadow);
      padding:14px;
    }
    .poster{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:22px;
      min-height:650px;
      background:
        radial-gradient(circle at 12% 10%, color-mix(in srgb, var(--accent) 18%, #fff) 0%, transparent 30%),
        radial-gradient(circle at 84% 12%, color-mix(in srgb, var(--accent) 26%, #fff) 0%, transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,.95) 0%, rgba(248,250,255,.95) 100%);
      border:1px solid rgba(255,255,255,.85);
    }
    .poster::before,.poster::after{
      content:"";
      position:absolute;
      border-radius:999px;
      filter:blur(16px);
      opacity:.45;
      pointer-events:none;
    }
    .poster::before{width:220px;height:220px;right:-60px;top:-40px;background:color-mix(in srgb, var(--accent) 65%, white)}
    .poster::after{width:180px;height:180px;left:-40px;bottom:70px;background:color-mix(in srgb, var(--accent) 35%, white)}
    .poster-top{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:start;margin-bottom:14px}
    .poster-brand{
      min-width:240px;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(255,255,255,.95);
      border-radius:24px;
      padding:12px 14px;
      box-shadow:var(--shadow-soft);
    }
    .poster-brand img{display:block;width:100%;max-width:220px;height:auto;margin:0 auto}
    .badge-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .badge{
      display:inline-flex;align-items:center;
      background:rgba(255,255,255,.88);
      border:1px solid rgba(255,255,255,.95);
      border-radius:999px;
      padding:8px 12px;
      font-size:.82rem;
      font-weight:800;
      color:#34415f;
      box-shadow:0 8px 18px rgba(20,30,55,.05);
    }
    .recipe-title{margin:0;font-size:clamp(2rem,5vw,3rem);line-height:.95;letter-spacing:-.03em;max-width:640px}
    .recipe-sub{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:10px;color:#4b5872;font-weight:700}
    .recipe-sub span{display:inline-flex;align-items:center;gap:8px}
    .recipe-sub span+span::before{content:"•";color:#9ca7bf}
    .poster-hero{
      position:relative;z-index:1;overflow:hidden;border-radius:28px;padding:12px;
      background:rgba(255,255,255,.86);
      border:1px solid rgba(255,255,255,.95);
      box-shadow:var(--shadow-soft);
    }
    .poster-hero img{display:block;width:100%;height:clamp(320px,43vw,470px);object-fit:cover;border-radius:22px}
    .macro-grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:14px}
    .macro{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);padding:14px;border-radius:18px;box-shadow:0 8px 18px rgba(20,30,55,.04)}
    .macro .k{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
    .macro .v{margin-top:4px;font-size:1.18rem;font-weight:900}
    .content-grid{position:relative;z-index:1;display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .panel{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);border-radius:24px;padding:18px 18px 20px;box-shadow:0 8px 18px rgba(20,30,55,.04)}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .panel h3{margin:0;font-size:1.02rem}
    .panel-tag{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#8b98b0}
    .ing-list,.step-list{list-style:none;padding:0;margin:0;display:grid;gap:10px}
    .ing-list li,.step-list li{display:flex;gap:10px;align-items:flex-start;line-height:1.42;color:#24314d;font-weight:650}
    .dot,.step-no{flex:0 0 auto;width:24px;height:24px;border-radius:999px;display:grid;place-items:center;font-size:.8rem;font-weight:900;color:var(--navy);background:color-mix(in srgb, var(--accent) 24%, #fff)}
    .poster-footer{position:relative;z-index:1;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-top:14px;color:#4b5872;font-size:.92rem;font-weight:700}
    .poster-footer .mini{display:inline-flex;align-items:center;gap:8px}
    .poster-footer .mini strong{color:var(--navy)}
    .controls{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-top:16px}
    .nav-group,.utility-group{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .nav-btn,.primary-btn,.ghost-btn{padding:13px 18px;border-radius:16px;font-weight:800}
    .primary-btn{background:linear-gradient(135deg,var(--navy),#375eff);color:#fff;border:none}
    .ghost-btn{background:#fff8ed;border-color:#ffe1ad;color:#8f5a00}
    .secondary-info{padding:0 4px;color:var(--muted);font-weight:800}
    .drawer-backdrop,.share-backdrop{
      position:fixed;inset:0;background:rgba(12,18,34,.42);backdrop-filter:blur(8px);
      opacity:0;pointer-events:none;transition:.24s ease;z-index:20;
    }
    .drawer-backdrop.open,.share-backdrop.open{opacity:1;pointer-events:auto}
    .drawer{
      position:fixed;top:0;right:0;width:min(92vw,430px);height:100%;
      background:linear-gradient(180deg,#f9fbff 0%, #f2f6ff 100%);
      border-left:1px solid rgba(255,255,255,.9);
      box-shadow:-24px 0 60px rgba(12,18,34,.18);
      padding:18px;transform:translateX(102%);transition:.28s ease;display:flex;flex-direction:column;gap:14px;z-index:21;
    }
    .drawer.open{transform:translateX(0)}
    .drawer-head,.share-head{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .drawer-head h2,.share-head h2{margin:0;font-size:1.16rem}
    .drawer-search{
      width:100%;padding:13px 15px;border-radius:16px;border:1px solid var(--line-strong);outline:none;
      background:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.7);
    }
    .filter-row{display:flex;gap:8px;flex-wrap:wrap}
    .filter-chip{padding:9px 12px;border-radius:999px;font-size:.84rem;font-weight:800}
    .filter-chip.active{background:linear-gradient(135deg,var(--navy),#304d95);color:#fff;border-color:transparent}
    .recipe-list{display:grid;gap:14px;overflow:auto;padding-bottom:24px}
    .drawer-group{display:grid;gap:10px}
    .drawer-group-title{font-size:.82rem;font-weight:900;text-transform:uppercase;letter-spacing:.08em;color:#7b88a2;padding:0 4px}
    .recipe-link{
      width:100%;text-align:left;padding:12px;border-radius:20px;background:#fff;border:1px solid var(--line);
      display:flex;justify-content:space-between;align-items:center;gap:12px;font-weight:850;color:var(--text);
    }
    .recipe-link.active{border-color:color-mix(in srgb, var(--accent) 44%, #abb9d7);box-shadow:0 16px 30px rgba(20,30,55,.08)}
    .recipe-link-main{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
    .recipe-thumb{width:64px;height:64px;border-radius:16px;object-fit:cover;background:#f1f5fb;border:1px solid #e7edf8;flex:0 0 auto}
    .recipe-text{min-width:0}
    .recipe-text div{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .recipe-text small{display:block;color:var(--muted);font-weight:700;margin-top:4px}
    .favorite-star{font-size:1.08rem}
    .share-sheet{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(18px);
      width:min(94vw,520px);background:linear-gradient(180deg,#fcfdff 0%, #f4f7ff 100%);
      border:1px solid rgba(255,255,255,.95);border-radius:28px;padding:18px;box-shadow:0 24px 60px rgba(12,18,34,.22);
      opacity:0;pointer-events:none;transition:.24s ease;z-index:22;
    }
    .share-sheet.open{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
    .share-copy{color:var(--muted);font-weight:650;margin:4px 0 0}
    .sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .sheet-btn{padding:15px 14px;border-radius:18px;font-weight:850;text-align:left}
    .sheet-btn strong{display:block;font-size:.98rem}
    .sheet-btn small{display:block;margin-top:4px;color:var(--muted);font-weight:700;line-height:1.35}
    .sheet-btn.primary{background:linear-gradient(135deg,#1f2a44,#2f5fff);color:#fff;border:none}
    .sheet-btn.primary small{color:rgba(255,255,255,.82)}
    .sheet-note{margin-top:12px;color:#7b88a2;font-size:.8rem;line-height:1.45}
    .toast{
      position:fixed;left:50%;bottom:18px;transform:translateX(-50%) translateY(24px);
      background:#192440;color:#fff;padding:12px 16px;border-radius:16px;font-weight:800;
      box-shadow:0 18px 40px rgba(12,18,34,.28);opacity:0;pointer-events:none;transition:.22s ease;z-index:30;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .empty-hint{color:var(--muted);font-weight:650;margin-top:4px}
    @media (max-width:900px){
      .poster-top{grid-template-columns:1fr}
      .poster-brand{min-width:unset;max-width:320px}
    }
    @media (max-width:720px){
      body{padding:12px 10px 28px}
      .brand{flex-direction:column;align-items:flex-start}
      .brand-logo{height:52px;max-width:min(74vw,320px)}
      .topbar{align-items:flex-start}
      .action-row{width:100%;justify-content:flex-start}
      .stats-strip{grid-template-columns:repeat(2,1fr)}
      .content-grid,.macro-grid{grid-template-columns:1fr 1fr}
      .sheet-grid{grid-template-columns:1fr}
    }
    @media (max-width:560px){
      .content-grid,.macro-grid{grid-template-columns:1fr}
      .controls{align-items:stretch}
      .nav-group,.utility-group{width:100%}
      .nav-btn,.primary-btn,.ghost-btn{flex:1}
      .poster{padding:18px}
      .recipe-title{font-size:clamp(1.9rem,9vw,2.5rem)}
      .share-sheet{left:10px;right:10px;width:auto;transform:translateY(18px)}
      .share-sheet.open{transform:translateY(0)}
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="drawer-backdrop" id="drawerBackdrop" aria-hidden="true"></div>
  <aside class="drawer" id="recipeDrawer" aria-label="Rezeptliste">
    <div class="drawer-head">
      <h2>Rezepte</h2>
      <button class="icon-btn" id="closeDrawerBtn" aria-label="Schließen">×</button>
    </div>
    <input class="drawer-search" id="drawerSearch" type="search" placeholder="Rezept suchen ..." aria-label="Rezept suchen" />
    <div class="filter-row" id="filterRow"></div>
    <div class="empty-hint">Wähle ein Rezept aus der Liste.</div>
    <div class="recipe-list" id="recipeList"></div>
  </aside>

  <div class="share-backdrop" id="shareBackdrop" aria-hidden="true"></div>
  <section class="share-sheet" id="shareSheet" aria-label="Rezept teilen">
    <div class="share-head">
      <div>
        <h2>Rezept teilen</h2>
        <p class="share-copy">Als Link oder als Story-Bild im 9:16-Format.</p>
      </div>
      <button class="icon-btn" id="closeShareBtn" aria-label="Schließen">×</button>
    </div>
    <div class="sheet-grid">
      <button class="sheet-btn primary" id="shareStoryBtn">
        <strong>Story teilen</strong>
        <small>Erstellt ein Story-Bild und öffnet auf kompatiblen Mobilgeräten das Teilen-Menü.</small>
      </button>
      <button class="sheet-btn" id="downloadStoryBtn">
        <strong>Story-Bild speichern</strong>
        <small>Speichert das aktuelle Rezept als 9:16-Bild für Instagram Stories.</small>
      </button>
      <button class="sheet-btn" id="shareLinkBtn">
        <strong>Link teilen</strong>
        <small>Öffnet das native Teilen-Menü für den Rezept-Link.</small>
      </button>
      <button class="sheet-btn" id="copyLinkBtn">
        <strong>Link kopieren</strong>
        <small>Kopiert den Link zum aktuellen Rezept in die Zwischenablage.</small>
      </button>
    </div>
    <div class="sheet-note">Tipp: Auf dem Smartphone funktioniert „Story teilen“ am besten über die veröffentlichte GitHub-Pages-Version.</div>
  </section>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
const STORAGE_KEYS={favorites:'fitRecipesFavorites',lastRecipe:'fitRecipesLastRecipe'};
const CATEGORY_META={
  'Frühstück':{label:'Frühstück',order:1},
  'Snack':{label:'Snack',order:2},
  'Lunch':{label:'Mittagessen',order:3},
  'Mittagessen':{label:'Mittagessen',order:3},
  'Dinner':{label:'Abendessen',order:4},
  'Abendessen':{label:'Abendessen',order:4}
};
const CATEGORY_ORDER=['Alle','Frühstück','Snack','Mittagessen','Abendessen'];
const state={
  recipes:[],
  currentIndex:0,
  favorites:new Set(JSON.parse(localStorage.getItem(STORAGE_KEYS.favorites)||'[]')),
  filterText:'',
  categoryFilter:'Alle'
};
const els={
  app:document.getElementById('app'),
  drawerBackdrop:document.getElementById('drawerBackdrop'),
  drawer:document.getElementById('recipeDrawer'),
  drawerList:document.getElementById('recipeList'),
  drawerSearch:document.getElementById('drawerSearch'),
  filterRow:document.getElementById('filterRow'),
  shareBackdrop:document.getElementById('shareBackdrop'),
  shareSheet:document.getElementById('shareSheet'),
  toast:document.getElementById('toast')
};
const ASSET_VERSION='v16-20260330-storyfix';
const RECIPE_IMAGES={};
function assetUrl(path){ return `${path}?v=${ASSET_VERSION}`; }
function categoryMeta(category){ return CATEGORY_META[category] || {label:category||'Rezept', order:99}; }
function displayCategory(category){ return categoryMeta(category).label; }
function normalizeForSort(recipe){
  return {
    ...recipe,
    categoryLabel:displayCategory(recipe.category),
    categoryOrder:categoryMeta(recipe.category).order
  };
}
function sortRecipes(recipes){
  const titlePreference=[
    'overnight oats','protein pancakes','protein-grießbrei mit beeren','protein-reispudding mango','baked oats cheesecake style',
    'ei & avocado toast','eier-avocado-toast deluxe',
    'skyr berry cup','cottage cheese bowl','quark-apfel-zimt-becher','skyr-schoko-bananen-creme','protein mug cake',
    'chicken rice bowl','thunfisch wrap','hähnchen-wrap fitness','thunfisch-reis-salat','beef burger bowl',
    'lachs mit süßkartoffel','puten pasta fit','garnelen couscous fit','puten-bolognese mit zucchini','lachs-spinat-pasta light','turkey burger bowl','rinderhack-gemüse-pfanne'
  ];
  const prefMap=new Map(titlePreference.map((item,index)=>[item,index]));
  return recipes
    .map(normalizeForSort)
    .sort((a,b)=>{
      if(a.categoryOrder!==b.categoryOrder) return a.categoryOrder-b.categoryOrder;
      const aPref=prefMap.has(a.title.toLowerCase()) ? prefMap.get(a.title.toLowerCase()) : 999;
      const bPref=prefMap.has(b.title.toLowerCase()) ? prefMap.get(b.title.toLowerCase()) : 999;
      if(aPref!==bPref) return aPref-bPref;
      return a.title.localeCompare(b.title,'de');
    })
    .map((item,index)=>({...item,index}));
}
state.recipes=sortRecipes(window.RECIPE_DATA || []);
function getVisibleRecipes(){
  return state.recipes.filter(recipe=>{
    const matchesCategory=state.categoryFilter==='Alle' || displayCategory(recipe.category)===state.categoryFilter;
    const q=state.filterText.trim().toLowerCase();
    const matchesText=!q || recipe.title.toLowerCase().includes(q) || displayCategory(recipe.category).toLowerCase().includes(q);
    return matchesCategory && matchesText;
  });
}
function getRecipeByHash(){
  const hash=decodeURIComponent(location.hash.replace('#','').trim());
  if(!hash) return null;
  return state.recipes.find(recipe=>recipe.id===hash)||null;
}
function isFavorite(id){ return state.favorites.has(id); }
function getRecipeImage(id){
  return RECIPE_IMAGES[id]||{src:assetUrl(`./images/${id}.jpg`),fallback:assetUrl(`./images/${id}.jpg`)};
}
function recipeImageTag(id,alt='',className=''){
  const image=getRecipeImage(id);
  return `<img ${className?`class="${className}" `:''}src="${image.src}" data-fallback="${image.fallback}" onerror="if(!this.dataset.failed&&this.dataset.fallback){this.dataset.failed='1';this.src=this.dataset.fallback;return;}this.onerror=null;" alt="${alt}" loading="lazy" />`;
}
function showToast(message){
  els.toast.textContent=message;
  els.toast.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer=setTimeout(()=>els.toast.classList.remove('show'),2200);
}
function setCurrentRecipe(index, updateHash=true){
  if(!state.recipes.length) return;
  const total=state.recipes.length;
  state.currentIndex=(index+total)%total;
  const recipe=state.recipes[state.currentIndex];
  localStorage.setItem(STORAGE_KEYS.lastRecipe, recipe.id);
  if(updateHash) history.replaceState(null,'','#'+encodeURIComponent(recipe.id));
  render();
}
function restoreInitialRecipe(){
  const fromHash=getRecipeByHash();
  if(fromHash){ state.currentIndex=fromHash.index; return; }
  const lastId=localStorage.getItem(STORAGE_KEYS.lastRecipe);
  const lastRecipe=state.recipes.find(recipe=>recipe.id===lastId);
  if(lastRecipe) state.currentIndex=lastRecipe.index;
}

  return `
    <div class="app-shell">

          </div>
        </div>

      <section class="stats-strip" aria-label="Kurzübersicht">
        <div class="stat-card"><div class="label">Kategorie</div><div class="value">${displayCategory(recipe.category)}</div></div>

        <div class="stat-card"><div class="label">Rezepte</div><div class="value">${state.recipes.length}</div></div>
        <div class="stat-card"><div class="label">Favoriten</div><div class="value">${state.favorites.size}</div></div>

      <main class="recipe-stage">
        <article class="poster" style="--accent:${recipe.accent}">
          <div class="poster-top">

              <div class="panel-head"><h3>Zutaten</h3><div class="panel-tag">${recipe.ingredients.length} Zutaten</div></div>
              <ul class="ing-list">${ing}</ul>
            </div>
            <div class="panel">
              <div class="panel-head"><h3>Zubereitung</h3><div class="panel-tag">${recipe.steps.length} Schritte</div></div>
              <ol class="step-list">${steps}</ol>
            </div>
          </section>

          <div class="poster-footer">
            <div class="mini"><strong>Rezept</strong> ${state.currentIndex+1} von ${state.recipes.length}</div>
            <div class="mini">${isFavorite(recipe.id)?'Als Favorit gespeichert':'Noch nicht favorisiert'}</div>
          </div>
        </article>

        <div class="controls">
          <div class="nav-group">
            <button class="nav-btn" id="prevBtn">← Vorheriges Rezept</button>
            <button class="nav-btn" id="nextBtn">Nächstes Rezept →</button>
          </div>
          <div class="utility-group">
            <button class="ghost-btn" id="storyQuickBtn" >Story-Bild teilen</button>
            <button class="primary-btn" id="randomBtn">Zufallsrezept</button>
            <div class="secondary-info">${recipe.title}</div>
          </div>
        </div>
      </main>
    </div>
  `;
}
function renderFilterChips(){
  els.filterRow.innerHTML=CATEGORY_ORDER.map(label=>`<button class="filter-chip ${state.categoryFilter===label?'active':''}" data-filter="${label}">${label}</button>`).join('');
}
function renderRecipeList(){
  renderFilterChips();
  const current=state.recipes[state.currentIndex];
  const visible=getVisibleRecipes();
  if(!visible.length){
    els.drawerList.innerHTML='<div class="empty-hint">Keine passenden Rezepte gefunden.</div>';
    return;
  }
  const grouped={};
  visible.forEach(item=>{
    const key=displayCategory(item.category);
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push(item);
  });
  const sections=CATEGORY_ORDER.filter(label=>label!=='Alle' && grouped[label]?.length).map(label=>`
    <section class="drawer-group">
      <div class="drawer-group-title">${label}</div>
      ${grouped[label].map(item=>`
        <button class="recipe-link ${item.id===current.id?'active':''}" data-open-recipe="${item.index}" style="--accent:${item.accent}">
          <div class="recipe-link-main">
            ${recipeImageTag(item.id, '', 'recipe-thumb')}
            <div class="recipe-text">
              <div>${item.title}</div>
              <small>${displayCategory(item.category)} · ${item.time}</small>
            </div>
          </div>
          <div class="favorite-star">${isFavorite(item.id)?'★':'☆'}</div>
        </button>
      `).join('')}
    </section>
  `).join('');
  els.drawerList.innerHTML=sections;
}
function openDrawer(){ els.drawerBackdrop.classList.add('open'); els.drawer.classList.add('open'); }
function closeDrawer(){ els.drawerBackdrop.classList.remove('open'); els.drawer.classList.remove('open'); }
function openShareSheet(){ els.shareBackdrop.classList.add('open'); els.shareSheet.classList.add('open'); }
function closeShareSheet(){ els.shareBackdrop.classList.remove('open'); els.shareSheet.classList.remove('open'); }
function toggleFavorite(){
  const recipe=state.recipes[state.currentIndex];
  if(isFavorite(recipe.id)){ state.favorites.delete(recipe.id); showToast('Favorit entfernt'); }
  else { state.favorites.add(recipe.id); showToast('Zu Favoriten hinzugefügt'); }
  localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(Array.from(state.favorites)));
  render();
}
async function shareLink(){
  const recipe=state.recipes[state.currentIndex];
  const url=location.href;
  const shareData={title:recipe.title,text:`${recipe.title} · ${recipe.protein} g Protein · ${recipe.kcal} kcal`,url};
  if(navigator.share){
    try{ await navigator.share(shareData); return true; }
    catch(err){ if(err && err.name==='AbortError') return false; }
  }
  return false;
}
async function copyLink(){
  const url=location.href;
  try{ await navigator.clipboard.writeText(url); showToast('Link zum Rezept kopiert'); return true; }
  catch(err){ showToast('Link konnte nicht kopiert werden'); return false; }
}
function roundedRect(ctx,x,y,w,h,r){
  const radius=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+radius,y);
  ctx.arcTo(x+w,y,x+w,y+h,radius);
  ctx.arcTo(x+w,y+h,x,y+h,radius);
  ctx.arcTo(x,y+h,x,y,radius);
  ctx.arcTo(x,y,x+w,y,radius);
  ctx.closePath();
}
function drawCoverImage(ctx,img,x,y,w,h,radius){
  const iw=img.naturalWidth||img.width;
  const ih=img.naturalHeight||img.height;
  const scale=Math.max(w/iw,h/ih);
  const sw=iw*scale;
  const sh=ih*scale;
  const dx=x+(w-sw)/2;
  const dy=y+(h-sh)/2;
  ctx.save();
  roundedRect(ctx,x,y,w,h,radius);
  ctx.clip();
  ctx.drawImage(img,dx,dy,sw,sh);
  ctx.restore();
}
function loadImage(src){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>resolve(img);
    img.onerror=reject;
    img.src=src;
  });
}
function blobToFile(blob,name){
  try{ return new File([blob], name, {type:blob.type||'image/png'}); }
  catch(err){ blob.name=name; return blob; }
}
function downloadBlob(blob,filename){
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=filename;
  a.rel='noopener';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  return url;
}
function openBlobInNewTab(blob){
  const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank','noopener');
  setTimeout(()=>URL.revokeObjectURL(url),15000);
  return !!win;
}
async function buildStoryBlob(recipe){
  const canvas=document.createElement('canvas');
  canvas.width=1080;
  canvas.height=1920;
  const ctx=canvas.getContext('2d');
  const [recipeImg,logoImg]=await Promise.all([
    loadImage(getRecipeImage(recipe.id).src),
    loadImage(assetUrl('./brand/logo-fit-coaching.png')).catch(()=>null)
  ]);

  const gradient=ctx.createLinearGradient(0,0,0,canvas.height);
  gradient.addColorStop(0,'#f8fbff');
  gradient.addColorStop(1,'#eef2fb');
  ctx.fillStyle=gradient;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const glow1=ctx.createRadialGradient(150,160,10,150,160,260);
  glow1.addColorStop(0,'rgba(239,155,32,.34)');
  glow1.addColorStop(1,'rgba(239,155,32,0)');
  ctx.fillStyle=glow1;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const glow2=ctx.createRadialGradient(920,260,10,920,260,260);
  glow2.addColorStop(0,'rgba(70,110,255,.24)');
  glow2.addColorStop(1,'rgba(70,110,255,0)');
  ctx.fillStyle=glow2;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle='#ffffff';
  roundedRect(ctx,64,64,952,1792,44);
  ctx.fill();
  ctx.strokeStyle='rgba(223,230,243,1)';
  ctx.lineWidth=2;
  ctx.stroke();

  if(logoImg){
    ctx.fillStyle='rgba(255,255,255,.92)';
    roundedRect(ctx,116,116,420,110,28);
    ctx.fill();
    ctx.drawImage(logoImg,140,138,360,68);
  }

  ctx.fillStyle='#182033';
  ctx.font='700 34px Inter, Arial, sans-serif';
  ctx.fillText('FITNESSREZEPT',116,286);

  ctx.font='900 72px Inter, Arial, sans-serif';
  const titleLines=wrapText(ctx, recipe.title.toUpperCase(), 848);
  let titleY=372;
  titleLines.slice(0,2).forEach(line=>{ ctx.fillText(line,116,titleY); titleY+=82; });

  ctx.fillStyle='#62708d';
  ctx.font='700 30px Inter, Arial, sans-serif';
  ctx.fillText(`${displayCategory(recipe.category)} · ${recipe.time} · ${recipe.protein} g Protein`,116,titleY+8);

  drawCoverImage(ctx,recipeImg,116,470,848,710,36);

  const macroY=1228;
  const macroWidth=196;
  const macroGap=16;
  const macros=[
    ['Kalorien',`${recipe.kcal} kcal`],
    ['Protein',`${recipe.protein} g`],
    ['KH',`${recipe.carbs} g`],
    ['Fett',`${recipe.fat} g`]
  ];
  macros.forEach((macro,idx)=>{
    const x=116 + idx*(macroWidth+macroGap);
    ctx.fillStyle='rgba(246,248,255,.98)';
    roundedRect(ctx,x,macroY,macroWidth,132,24);
    ctx.fill();
    ctx.fillStyle='#7b88a2';
    ctx.font='800 22px Inter, Arial, sans-serif';
    ctx.fillText(macro[0].toUpperCase(),x+24,macroY+46);
    ctx.fillStyle='#182033';
    ctx.font='900 34px Inter, Arial, sans-serif';
    ctx.fillText(macro[1],x+24,macroY+92);
  });

  ctx.fillStyle='rgba(255,248,237,1)';
  roundedRect(ctx,116,1408,848,260,30);
  ctx.fill();
  ctx.fillStyle='#8f5a00';
  ctx.font='900 24px Inter, Arial, sans-serif';
  ctx.fillText('ZUTATEN-HIGHLIGHTS',148,1460);
  ctx.fillStyle='#24314d';
  ctx.font='700 34px Inter, Arial, sans-serif';
  const ingredientsText=recipe.ingredients.slice(0,4).join(' · ');
  const ingLines=wrapText(ctx, ingredientsText, 784);
  let iy=1518;
  ingLines.slice(0,3).forEach(line=>{ ctx.fillText(line,148,iy); iy+=42; });

  ctx.fillStyle='#62708d';
  ctx.font='700 26px Inter, Arial, sans-serif';
  ctx.fillText('Mehr Rezepte in der Fit Coaching App',116,1766);

  return new Promise((resolve,reject)=>canvas.toBlob(blob=>blob?resolve(blob):reject(new Error('blob failed')),'image/png',0.94));
}
function wrapText(ctx,text,maxWidth){
  const words=String(text).split(/\s+/);
  const lines=[];
  let line='';
  words.forEach(word=>{
    const test=line ? `${line} ${word}` : word;
    if(ctx.measureText(test).width>maxWidth && line){
      lines.push(line);
      line=word;
    }else line=test;
  });
  if(line) lines.push(line);
  return lines;
}
async function shareStoryImage(downloadOnly=false){
  const recipe=state.recipes[state.currentIndex];
  closeShareSheet();
  showToast(downloadOnly ? 'Story-Bild wird vorbereitet ...' : 'Story-Bild wird vorbereitet ...');
  try{
    const blob=await buildStoryBlob(recipe);
    const filename=`${recipe.id}-story.png`;
    const file=blobToFile(blob,filename);

    if(navigator.share){
      try{
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({
            files:[file],
            title:recipe.title,
            text:`${recipe.title} · Rezept aus der Fit Coaching App`
          });
          showToast('Story-Bild geöffnet');
          return;
        }
        if(!downloadOnly){
          await navigator.share({
            title:recipe.title,
            text:`${recipe.title} · Rezept aus der Fit Coaching App`,
            url:location.href
          });
          showToast('Teilen geöffnet');
          return;
        }
      }catch(err){
        if(err && err.name==='AbortError') return;
      }
    }

    try{
      downloadBlob(blob,filename);
      showToast(downloadOnly ? 'Story-Bild gespeichert' : 'Story-Bild heruntergeladen');
      return;
    }catch(err){}

    if(openBlobInNewTab(blob)){
      showToast('Story-Bild in neuem Tab geöffnet');
      return;
    }

    showToast('Story-Bild konnte nicht geöffnet werden');
  }catch(err){
    console.error(err);
    showToast('Story-Bild konnte nicht erstellt werden');
  }
}
async function handleStoryQuickAction(){
  await shareStoryImage(false);
}
async function handleShareLink(){
  closeShareSheet();
  const ok=await shareLink();
  if(!ok) await copyLink();
}
function bindEvents(){
  document.getElementById('prevBtn')?.addEventListener('click',()=>setCurrentRecipe(state.currentIndex-1));
  document.getElementById('nextBtn')?.addEventListener('click',()=>setCurrentRecipe(state.currentIndex+1));
  document.getElementById('randomBtn')?.addEventListener('click',()=>{
    if(state.recipes.length<2){ showToast('Nur ein Rezept vorhanden'); return; }
    let next=state.currentIndex;
    while(next===state.currentIndex) next=Math.floor(Math.random()*state.recipes.length);
    setCurrentRecipe(next);
  });
  document.getElementById('favoriteBtn')?.addEventListener('click',toggleFavorite);
  document.getElementById('shareBtn')?.addEventListener('click',openShareSheet);
  document.getElementById('storyQuickBtn')?.addEventListener('click',handleStoryQuickAction);
  document.getElementById('openRecipesBtn')?.addEventListener('click',openDrawer);
  bindDrawerOnlyEvents();
}
function bindDrawerOnlyEvents(){
  els.drawerList.querySelectorAll('[data-open-recipe]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const index=Number(btn.getAttribute('data-open-recipe'));
      closeDrawer();
      setCurrentRecipe(index);
    });
  });
  els.filterRow.querySelectorAll('[data-filter]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.categoryFilter=btn.getAttribute('data-filter')||'Alle';
      renderRecipeList();
      bindDrawerOnlyEvents();
    });
  });
}
function bindStaticEvents(){
  els.drawerSearch.addEventListener('input',()=>{
    state.filterText=els.drawerSearch.value||'';
    renderRecipeList();
    bindDrawerOnlyEvents();
  });
  document.getElementById('closeDrawerBtn')?.addEventListener('click',closeDrawer);
  document.getElementById('closeShareBtn')?.addEventListener('click',closeShareSheet);
  document.getElementById('shareStoryBtn')?.addEventListener('click',()=>shareStoryImage(false));
  document.getElementById('downloadStoryBtn')?.addEventListener('click',()=>shareStoryImage(true));
  document.getElementById('shareLinkBtn')?.addEventListener('click',handleShareLink);
  document.getElementById('copyLinkBtn')?.addEventListener('click',async()=>{ closeShareSheet(); await copyLink(); });
  els.drawerBackdrop.addEventListener('click',closeDrawer);
  els.shareBackdrop.addEventListener('click',closeShareSheet);
}
function render(){
  const recipe=state.recipes[state.currentIndex];
  document.title=`${recipe.title} · Fitnessrezepte App`;
  els.app.innerHTML=recipePoster(recipe);
  renderRecipeList();
  bindEvents();
}
function registerServiceWorker(){
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{ navigator.serviceWorker.register('./service-worker.js').catch(()=>{}); });
  }
}
window.addEventListener('hashchange',()=>{
  const target=getRecipeByHash();
  if(target) setCurrentRecipe(target.index,false);
});
restoreInitialRecipe();
bindStaticEvents();
render();
registerServiceWorker();
  </script>
